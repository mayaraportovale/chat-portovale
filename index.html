<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GRE Conecta — Suporte Inteligente</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
/* ─── RESET ─────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:#f0f2f5}

/* ─── PORTAL SHELL ───────────────────────────────────── */
.portal{min-height:100vh;background:#f0f2f5;position:relative}

.navbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 28px;height:54px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 1px 3px rgba(0,0,0,.06)}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo .logo-mark{width:36px;height:36px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);
  border-radius:9px;display:flex;align-items:center;justify-content:center}
.nav-logo .logo-mark i{font-size:19px;color:#fff}
.nav-logo .brand{font-size:13px;font-weight:800;color:#1d4ed8;letter-spacing:.2px}
.nav-logo img{height:40px;margin-right:12px}
.nav-logo .sub{font-size:10px;color:#9ca3af;letter-spacing:.6px;text-transform:uppercase;margin-top:1px}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-status{display:flex;align-items:center;gap:5px;font-size:12px;color:#6b7280;
  border:1px solid #e5e7eb;border-radius:20px;padding:4px 11px;background:#f9fafb}
.dot-green{width:7px;height:7px;border-radius:50%;background:#22c55e;
  box-shadow:0 0 0 2px rgba(34,197,94,.2)}
.nav-user{display:flex;align-items:center;gap:9px;cursor:pointer;padding:4px 8px;
  border-radius:8px;transition:background .12s}
.nav-user:hover{background:#f3f4f6}
.nav-user .av{width:33px;height:33px;border-radius:50%;
  background:linear-gradient(135deg,#1d4ed8,#60a5fa);
  color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.nav-user .u-name{font-size:13px;font-weight:600;color:#111827}
.nav-user .u-role{font-size:10.5px;color:#6b7280}

.main-content{padding:32px 36px}
.section-title{font-size:22px;font-weight:800;color:#111827;margin-bottom:3px}
.section-sub{font-size:13px;color:#6b7280;margin-bottom:26px}
.cat-label{font-size:11px;font-weight:700;color:#9ca3af;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:10px;margin-top:20px}
.tools-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.tool-card{background:#fff;border:1px solid #e5e7eb;border-radius:11px;
  padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;
  border-left:4px solid transparent;transition:box-shadow .15s,transform .12s}
.tool-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.08);transform:translateY(-1px)}
.icon-box{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0}
.icon-box i{font-size:18px;color:#fff}
.tc-name{font-size:13px;font-weight:600;color:#111827;margin-bottom:1px}
.tc-desc{font-size:11px;color:#9ca3af}
.ic-purple{background:#7c3aed}.ic-amber{background:#d97706}.ic-blue{background:#2563eb}
.ic-green{background:#16a34a}.ic-navy{background:#1e3a5f}.ic-orange{background:#ea580c}
.ic-teal{background:#0d9488}.ic-rose{background:#e11d48}.ic-sky{background:#0284c7}
.bl-purple{border-left-color:#7c3aed}.bl-amber{border-left-color:#d97706}
.bl-blue{border-left-color:#2563eb}.bl-green{border-left-color:#16a34a}
.bl-navy{border-left-color:#1e3a5f}.bl-orange{border-left-color:#ea580c}
.bl-teal{border-left-color:#0d9488}.bl-rose{border-left-color:#e11d48}
.bl-sky{border-left-color:#0284c7}

.portal-footer{text-align:center;padding:18px;color:#d1d5db;font-size:11px;
  border-top:1px solid #e5e7eb;background:#f9fafb;margin-top:24px}

/* Widget root removido ou oculto conforme solicitado */
.widget-root { display: none !important; }
</style>
</head>
<body>
<div class="portal">
  <nav class="navbar">
    <div class="nav-logo">
      <div class="logo-mark"><i class="ti ti-shield-check"></i></div>
      <div class="brand">GRE CONECTA</div>
    </div>
    <div class="nav-right">
      <div class="nav-status"><div class="dot-green"></div> Sistema Online</div>
      <div class="nav-user">
        <div class="av">PV</div>
        <div>
          <div class="u-name">Porto Vale</div>
          <div class="u-role">Administrador</div>
        </div>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <h1 class="section-title">Portal de Suporte</h1>
    <p class="section-sub">Escolha uma ferramenta para começar.</p>

    <div class="cat-label">Ferramentas</div>
    <div class="tools-grid">
      <!-- Card Novo Ticket GRE redirecionando para suporte-gre.html -->
      <div class="tool-card bl-blue" onclick="window.location.href='suporte-gre.html'">
        <div class="icon-box ic-blue"><i class="ti ti-ticket"></i></div>
        <div>
          <div class="tc-name">Novo ticket - GRE</div>
          <div class="tc-desc">Abra um novo chamado para o suporte.</div>
        </div>
      </div>

      <div class="tool-card bl-amber"><div class="icon-box ic-amber"><i class="ti ti-history"></i></div><div><div class="tc-name">Meus Chamados</div><div class="tc-desc">Consulte seus chamados abertos.</div></div></div>
      <div class="tool-card bl-green"><div class="icon-box ic-green"><i class="ti ti-books"></i></div><div><div class="tc-name">Base de Conhecimento</div><div class="tc-desc">Artigos e tutoriais.</div></div></div>
    </div>
  </main>

  <footer class="portal-footer">Tecnologia · Porto Vale</footer>
</div>
</body>
</html>
